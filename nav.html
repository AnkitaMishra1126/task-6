<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>   
    header{
            background-color: transparent;
        }
        nav{
              padding: 6px;
              display: flex;
              justify-content: space-between;
              margin: 0 1.8rem;
        }
        .logo{
            color: rgb(47, 47, 47);
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 0.8rem;
        }
        nav > ul{
            list-style: none;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            gap: 1.8rem;
        }
        li > a{
            text-decoration: none;
            color: rgb(47, 47, 47);
            text-transform: capitalize;
            font-size: 1.2rem;
            font-weight: 600;
        }
        .username{
            color: rgb(54, 196, 252);
            border-radius: 10px;
            background-color: rgba(135, 207, 235, 0.504);
            font-size: 20px;
            font-weight:500;
            padding: 1rem;
            text-transform: capitalize;
        }
        </style>
</head>
<body>
     <header>
        <nav>
            <div class="logo">logo</div>
            <ul>
                <li><a href="/home">home</a></li>
                <li><a href="/about">about</a></li>
                <li><a href="/contact">contact</a></li>
            </ul>
            <div class="username">username</div>
        </nav>
    </header>
</body>
</html>
